name: UI Build

on:
  push:
    paths:
      - 'UI/**'
  pull_request:
    paths:
      - 'UI/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: UI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Verify build output
        run: ls -R dist